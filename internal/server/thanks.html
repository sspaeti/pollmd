<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Thanks!</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    max-width: 32rem; margin: 4rem auto; padding: 0 1rem;
    color: #222; line-height: 1.55;
  }
  h1 { font-weight: 500; margin-bottom: 0.5rem; }
  a { color: #0366d6; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .muted { color: #666; font-size: 0.9rem; margin-top: 2.5rem; }
</style>
</head>
<body>
  <h1>Thanks for your vote!</h1>
  <p>Your feedback helps shape the next newsletter.</p>
  <p><a href="{{.BlogURL}}">Back to the blog &rarr;</a></p>
  <p class="muted">
    No cookies, no tracking. Your request was hashed anonymously with a salt
    that rotates every day at midnight UTC, so the hash can&rsquo;t be tied
    back to you.
  </p>
</body>
</html>
